    /* --------------------------------------------------
       PREMIUM "COOL/SOOTHING" ANIMATIONS & TRANSITIONS
       -------------------------------------------------- */
    
    /* Sophisticated Smooth Page Loading slide & scale */
    @keyframes fadeInUp {
      from {
        transform: translateY(24px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    @keyframes fadeInScale {
      from {
        transform: scale(0.97) translateY(10px);
        opacity: 0;
      }
      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }
    @keyframes slowPan {
      from {
        background-position: 0% 50%;
      }
      to {
        background-position: 100% 50%;
      }
    }
    @keyframes slideDown {
      from {
        transform: translateY(-15px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    /* Ultra-soothing Golden Particle Drift */
    @keyframes driftUp {
      0% {
        transform: translateY(110vh) translateX(0) scale(0.8);
        opacity: 0;
      }
      10% {
        opacity: 0.35;
      }
      90% {
        opacity: 0.35;
      }
      100% {
        transform: translateY(-10vh) translateX(60px) scale(1.2);
        opacity: 0;
      }
    }
    

    .animate-fade-in-up {
      animation: fadeInUp 0.75s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-scale-up {
      animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-slow-pan {
      animation: slowPan 25s linear infinite alternate;
    }
    .animate-slide-down {
      animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Transition utilities */
    .hover-scale {
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .hover-scale:hover {
      transform: translateY(-6px) scale(1.015);
      box-shadow: 0 20px 35px -5px rgba(46, 11, 17, 0.08);
    }

    /* Elegant Sheen Shimmer effect on cards */
    .shimmer-container {
      position: relative;
      overflow: hidden;
    }
    .shimmer-container::after {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 50%;
      height: 100%;
      background: linear-gradient(
        to right,
        rgba(255, 255, 255, 0) 0%,
        rgba(212, 175, 55, 0.18) 50%,
        rgba(255, 255, 255, 0) 100%
      );
      transform: skewX(-25deg);
      transition: none;
    }
    .shimmer-container:hover::after {
      left: 150%;
      transition: left 0.95s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Soft backdrop particle glow layer */
    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.55) 0%, rgba(212, 175, 55, 0) 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
    }
    
    .particle:nth-child(1) { width: 6px; height: 6px; left: 15%; animation: driftUp 18s linear infinite; animation-delay: 0s; }

    .particle:nth-child(3) { width: 5px; height: 5px; left: 55%; animation: driftUp 16s linear infinite; animation-delay: -7s; }
    .particle:nth-child(4) { width: 7px; height: 7px; left: 75%; animation: driftUp 20s linear infinite; animation-delay: -2s; }

  </style>
</head>

      // Premium Javascript smooth scroll custom timing animator function (ត្រជាក់ភ្នែក)
      var customSmoothScroll = function(targetId) {
        var target = document.getElementById(targetId);
        if (!target) return;
        var navbarOffset = 80;
        var targetPosition = target.getBoundingClientRect().top + window.pageYOffset - navbarOffset;
        var startPosition = window.pageYOffset;
        var distance = targetPosition - startPosition;
        var startTime = null;
        var duration = 950; // Soothing decelerating scroll duration (ms)

        // Cubic easeInOut Easing Curve
        var easeInOutCubic = function(t, b, c, d) {
          t /= d / 2;
          if (t < 1) return c / 2 * t * t * t + b;
          t -= 2;
          return c / 2 * (t * t * t + 2) * b;
        };

        var animationStep = function(currentTime) {
          if (startTime === null) startTime = currentTime;
          var timeElapsed = currentTime - startTime;
          var run = easeInOutCubic(timeElapsed, startPosition, distance, duration);
          window.scrollTo(0, run);
          if (timeElapsed < duration) {
            requestAnimationFrame(animationStep);
          } else {
            window.scrollTo(0, targetPosition);
          }
        };

        requestAnimationFrame(animationStep);
      };

      // Smooth custom scroll back to top of screen
      var customScrollToTop = function() {
        var startPosition = window.pageYOffset;
        if (startPosition === 0) return;
        var startTime = null;
        var duration = 850;

        var easeOutCubic = function(t, b, c, d) {
          t /= d;
          t--;
          return c * (t * t * t + 1) + b;
        };

        var animationStep = function(currentTime) {
          if (startTime === null) startTime = currentTime;
          var timeElapsed = currentTime - startTime;
          var run = easeOutCubic(timeElapsed, startPosition, -startPosition, duration);
          window.scrollTo(0, run);
          if (timeElapsed < duration) {
            requestAnimationFrame(animationStep);
          } else {
            window.scrollTo(0, 0);
          }
        };

        requestAnimationFrame(animationStep);
      };

        var apiKey = ""; 
        var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=" + apiKey;
        
        var payload = {
          contents: [{ parts: [{ text: promptText }] }]
        };
        if (systemInstruction) {
          payload.systemInstruction = { parts: [{ text: systemInstruction }] };
        }

        var delay = 1000;
        for (var i = 0; i < 5; i++) {
          try {
            var response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (response.ok) {
              var json = await response.json();
              return json.candidates?.[0]?.content?.parts?.[0]?.text || '';
            }
          } catch (err) {}
          await new Promise(r => setTimeout(r, delay));
          delay *= 2;
        }
        throw new Error("API Connection failed after retries.");
      };

        setLoginForm(Object.assign({}, loginForm, { [field]: value }));
      };

      var updateNewProductForm = function(field, value) {
        setNewProductForm(Object.assign({}, newProductForm, { [field]: value }));
      };

      return (
        <div className="min-h-screen flex flex-col bg-[#FAF7F2] pb-24 md:pb-0">
          
          {/* Notification Toast Component */}
          {toast.show && (
            <div className="fixed top-6 right-6 z-[9999] animate-bounce max-w-sm w-full bg-stone-900 text-stone-100 px-4 py-3 rounded-xl shadow-2xl flex items-center justify-between border border-amber-500/30">
              <span className="text-sm font-semibold">{toast.message}</span>
              <button onClick={() => setToast({ show: false, message: '', type: 'success' })} className="text-amber-500 hover:text-white ml-2">
                <Icons.X />
              </button>
            </div>
          )}

          {/* Premium Khmer Header Navbar */}
          <header className="sticky top-0 z-50 bg-khmerMaroon text-white shadow-xl border-b-2 border-amber-600/50">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between">
              
              {/* Logo / Brand Name - Updated Application Title */}
              <div className="flex items-center space-x-3 cursor-pointer group" onClick={() => { setSelectedProduct(null); customScrollToTop(); }}>
                <div className="w-12 h-12 bg-amber-500 rounded-full flex items-center justify-center font-bold text-khmerMaroon text-xl shadow-lg border border-amber-200 transition-transform duration-700 group-hover:rotate-12">
                  🌾
                </div>
                <div className="min-w-0">
                  <h1 className="moul-font text-xs sm:text-base text-amber-400 tracking-wide transition-colors duration-300 group-hover:text-amber-300 truncate">ផ្សារអនឡាញផលិតផលខ្មែរ</h1>
                  <p className="text-[9px] sm:text-[10px] tracking-widest text-stone-300 uppercase font-bold truncate">Khmer Artisan E-Market</p>
                </div>
              </div>

              {/* Navigation Links for Desktop Only */}
              <div className="hidden md:flex items-center space-x-8">
                <button 
                  onClick={() => { setSelectedProduct(null); customScrollToTop(); }} 
                  className="text-stone-200 hover:text-amber-400 font-bold transition-all duration-500 text-sm py-1.5 relative group select-none"
                >
                  {t("ទំព័រដើម", "Home")}
                  <span className="absolute bottom-0 left-0 w-0 h-0.5 bg-amber-400 transition-all duration-500 group-hover:w-full"></span>
                </button>

                <button 
                  onClick={() => {
                    setSelectedProduct(null);
                    setTimeout(() => {
                      var target = document.getElementById('catalog-section');
                      if (target) {
                        target.scrollIntoView({ behavior: 'smooth' });
                      }
                    }, 100);
                  }} 
                  className="text-stone-200 hover:text-amber-400 font-bold transition-all duration-500 text-sm py-1.5 relative group select-none"
                >
                  {t("ផលិតផល", "Products")}
                  <span className="absolute bottom-0 left-0 w-0 h-0.5 bg-amber-400 transition-all duration-500 group-hover:w-full"></span>
                </button>

                <button 
                  onClick={() => setShowAdminModal(true)} 
                  className="text-stone-200 hover:text-amber-400 font-bold transition-all duration-500 text-sm py-1.5 relative group select-none"
                >
                  {t("អំពីយើង", "About Us")}
                  <span className="absolute bottom-0 left-0 w-0 h-0.5 bg-amber-400 transition-all duration-500 group-hover:w-full"></span>
                </button>

                {/* Authentication Gate */}
                {currentUser ? (
                  <div className="flex items-center space-x-3 pl-4 border-l border-white/20 select-none">
                    <div className="w-8 h-8 bg-stone-700 rounded-full flex items-center justify-center border border-amber-500/40 text-sm transition-transform duration-300 hover:scale-110">
                      👤
                    </div>
                    <div className="text-left">
                      <p className="text-xs font-semibold text-white">{currentUser.fullName}</p>
                      <button onClick={() => { setCurrentUser(null); triggerNotification(t("ចាកចេញពីគណនីរួចរាល់!", "Successfully logged out!"), "info"); }} className="text-[10px] text-amber-400 hover:underline">
                        {t("ចាកចេញ", "Logout")}
                      </button>
                    </div>
                  </div>
                ) : (
                  <button 
                    onClick={() => { setLoginForm({ ...loginForm, isRegister: false }); setShowLoginModal(true); }}
                    className="flex items-center gap-1.5 border border-white/30 hover:border-amber-400 px-4 py-2.5 rounded-xl text-xs hover:text-amber-400 transition-all duration-500 hover:shadow-lg hover:shadow-amber-500/10 active:scale-95 select-none"
                  >
                    <Icons.User />
                    {t("ចូលគណនី", "Login")}
                    
                  </button>
                )}
                <div className="relative mr-2 cursor-pointer group">
                  <div className="p-2.5 bg-stone-800 rounded-xl text-amber-400 border border-white/10 group-hover:border-amber-500 transition-all">
                    <Icons.ShoppingCart />
                  </div>
                  {cart.length > 0 && (
                    <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold animate-pulse shadow-lg">
                      {cart.length}
                    </span>
                  )}
                </div>

                {/* Local Switch Language Controls */}
                <button 
                  onClick={() => setLang(lang === 'kh' ? 'en' : 'kh')} 
                  className="bg-stone-800 border border-amber-600/30 text-amber-400 text-xs px-3 py-2.5 rounded-xl hover:bg-stone-700 transition-all duration-500 flex items-center gap-1.5 active:scale-95 select-none"
                >
                  <Icons.Globe />
                  {lang === 'kh' ? 'English' : 'ខ្មែរ'}
                </button>
              </div>

              {/* Simplified Mobile Header Actions */}
              <div className="flex md:hidden items-center space-x-2 select-none">
                <button 
                  onClick={() => setLang(lang === 'kh' ? 'en' : 'kh')} 
                  className="text-amber-400 text-[11px] bg-stone-800 px-3 py-2.5 rounded-xl font-bold transition-all active:scale-95 border border-white/5"
                >
                  {lang === 'kh' ? 'EN' : 'KH'}
                </button>

                {currentUser ? (
                  <button 
                    onClick={() => { setCurrentUser(null); triggerNotification(t("ចាកចេញពីគណនីរួចរាល់!", "Successfully logged out!"), "info"); }}
                    className="bg-stone-800 text-amber-400 text-[11px] px-3 py-2.5 rounded-xl font-bold transition-all active:scale-95 border border-white/5"
                  >
                    {t("ចាកចេញ", "Logout")}
                  </button>
                ) : (
                  <button 
                    onClick={() => { setLoginForm({ ...loginForm, isRegister: false }); setShowLoginModal(true); }}
                    className="bg-stone-800 text-amber-400 text-[11px] px-3 py-2.5 rounded-xl font-bold transition-all active:scale-95 border border-white/5 flex items-center gap-1.5"
                  >
                    <Icons.User />
                    {t("ចូល", "Login")}
                  </button>
                )}
              </div>

            </div>
          </header>

          {/* Hero Welcoming Banner Area with beautiful Angkor motifs pattern */}
          <section className="bg-gradient-to-r from-khmerMaroon via-khmerMaroonLight to-khmerMaroon text-white py-12 sm:py-16 px-4 text-center relative overflow-hidden border-b-4 border-amber-500/80">
            {/* Soothing Golden Particle Layer */}
            <div className="particle"></div>
            <div className="particle"></div>
            <div className="particle"></div>
            <div className="particle"></div>
            <div className="particle"></div>
            
            {/* Smooth animated slow panning background pattern */}
            <div className="absolute inset-0 opacity-15 bg-[radial-gradient(#d4af37_1.5px,transparent_1.5px)] [background-size:20px_20px] animate-slow-pan"></div>
            <div className="max-w-4xl mx-auto relative z-10 space-y-5 sm:space-y-6 animate-scale-up">
              <span className="text-amber-400 uppercase tracking-widest text-[10px] sm:text-[11px] font-bold bg-amber-500/10 px-3 sm:px-4 py-1.5 rounded-full border border-amber-500/20 shadow-inner">
                {t("សិប្បកម្ម និងកសិផលខ្មែរពិតៗ ១០០%", "100% Authentic Khmer Crafts & Agri-Goods")}
              </span>
              
              {/* Updated main banner heading: Split into 2 beautifully separated, soothing lines (គម្លាតរលូនត្រជាក់ភ្នែក) */}
              <h2 className="moul-font text-xl sm:text-4xl lg:text-5xl text-amber-300 drop-shadow-xl flex flex-col gap-3 sm:gap-6 leading-snug">
                <span className="tracking-wide">{t("គាំទ្រផលិតផលជាតិ", "Support National Products")}</span>
                <span className="text-amber-400/90 text-lg sm:text-3xl lg:text-4xl font-normal tracking-wide">{t("លើកស្ទួយសេដ្ឋកិច្ចគ្រួសារ", "Promote Family Economy")}</span>
              </h2>
              
              {/* បានកែសម្រួលឃ្លាពិពណ៌នានៅទីនេះស្របតាមការណែនាំយ៉ាងល្អឥតខ្ចោះ */}
              <p className="text-stone-300 max-w-2xl mx-auto text-xs sm:text-base leading-relaxed font-light px-2">
                {t(
                  "ផ្សារភ្ជាប់លោកអ្នកជាមួយនិងផលិតផលខ្មែរយ៉ាងច្រើនសម្បូរបែប",
                  "Connecting you with a rich variety of Khmer products."
                )}
              </p>
              
              <div className="pt-2 hidden sm:flex flex-col sm:flex-row justify-center gap-3 max-w-xs sm:max-w-none mx-auto select-none">
                <button 
                  onClick={() => setShowSubmitModal(true)} 
                  className="bg-amber-500 hover:bg-amber-600 text-stone-900 px-8 py-4 rounded-xl font-bold text-sm shadow-lg shadow-amber-900/40 transition-all duration-500 hover:scale-105 active:scale-95 flex items-center justify-center gap-2 w-full sm:w-auto"
                >
                  {t("ចាប់ផ្តើមលក់ក្នុងប្រព័ន្ធ", "Join as Community Artisan")}
                </button>
              </div>
            </div>
          </section>

          {/* Main Workspace Layout Container */}
          <main className="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6 sm:py-10">
            
            {/* If a product detail is selected, focus on rendering details */}
            {selectedProduct ? (
              <div className="bg-white rounded-2xl sm:rounded-3xl shadow-xl overflow-hidden border border-stone-200/60 animate-scale-up">
                
                {/* Product details top navigator back panel */}
                <div className="bg-stone-50 border-b border-stone-200/80 px-4 sm:px-6 py-4 flex items-center justify-between select-none">
                  <button 
                    onClick={() => { setSelectedProduct(null); customScrollToTop(); }} 
                    className="flex items-center gap-2 text-stone-600 hover:text-amber-800 transition-all duration-300 text-sm font-semibold group py-2"
                  >
                    <span className="transition-transform duration-300 group-hover:-translate-x-1">←</span>
                    <span>{t("ត្រឡប់ទៅកាន់ទំព័រដើម", "Back to Home")}</span>
                  </button>
                  <div className="flex items-center gap-2">
                    <button 
                      onClick={(e) => copyProductLink(selectedProduct, e)}
                      className="p-3 text-stone-500 hover:text-stone-855 hover:bg-stone-100 bg-white border border-stone-200 rounded-xl transition-all duration-300 active:scale-90"
                      title={t("ចែករំលែកផលិតផល", "Share Product")}
                    >
                      <Icons.Share2 />
                    </button>
                  </div>
                </div>

                {/* Core Detailed product split layout */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 p-4 sm:p-6 lg:p-10">
                  
                  {/* Left Column product media showcase */}
                  <div className="space-y-4">
                    <div className="relative rounded-2xl overflow-hidden bg-stone-100 aspect-square group shadow-md border border-stone-200/50">
                      <img 
                        src={selectedProduct.image} 
                        alt={selectedProduct.name[lang]} 
                        className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-[1200ms] ease-out"
                      />
                      <span className="absolute top-4 left-4 bg-amber-500 text-stone-900 text-xs px-3 py-1 rounded-full font-bold shadow">
                        ★ {selectedProduct.rating}
                      </span>
                      <span className="absolute bottom-4 left-4 bg-khmerMaroon/90 text-white text-xs px-3 py-1 rounded-full flex items-center gap-1">
                        <Icons.MapPin />
                        {selectedProduct.origin[lang]}
                      </span>
                    </div>
                  </div>

                  {/* Right Column details text data */}
                  <div className="space-y-6 flex flex-col justify-between">
                    <div>
                      <h2 className="moul-font text-lg sm:text-2xl text-khmerMaroon leading-relaxed">{selectedProduct.name[lang]}</h2>
                      
                      <div className="flex items-center space-x-2 mt-2">
                        <div className="flex">
                          {[1, 2, 3, 4, 5].map(star => (
                            <Icons.Star key={star} filled={star <= Math.round(selectedProduct.rating)} />
                          ))}
                        </div>
                        <span className="text-stone-500 text-xs">({selectedProduct.reviewsCount} {t("មតិយោបល់", "reviews")})</span>
                      </div>

                      <div className="my-4 p-3 bg-stone-50 rounded-xl border border-stone-200/50 inline-block transition-transform duration-500 hover:scale-105">
                        <span className="text-2xl sm:text-3xl font-extrabold text-amber-600">${selectedProduct.price}</span>
                        <span className="text-xs text-stone-500 ml-1">/ {t("ឯកតា", "unit")}</span>
                      </div>

                      {/* Content panel displaying product info directly (លុបប្រព័ន្ធផ្ទាំងរឿងរ៉ាវ AI ចេញតាមតម្រូវការ) */}
                      <div className="py-4 text-xs sm:text-sm text-stone-600 leading-relaxed space-y-3 transition-all duration-500 border-t border-stone-100">
                        <div className="animate-fade-in-up">
                          <p className="text-stone-700 text-sm sm:text-base leading-relaxed mb-4">{selectedProduct.description[lang]}</p>
                          <div className="bg-stone-50 p-4 rounded-xl space-y-2.5 text-xs border border-stone-200/40 mt-3">
                            <p><strong>{t("លក្ខណៈបច្ចេកទេស៖", "Specifications:")}</strong> {selectedProduct.details[lang]}</p>
                            <p><strong>{t("របៀបច្នៃប្រឌិត៖", "Crafting Technique:")}</strong> {selectedProduct.technique[lang]}</p>
                            <p><strong>{t("ទីតាំងហាង៖", "Store Location:")}</strong> {selectedProduct.origin[lang]}</p> {/* បានប្តូរពី ទីកន្លែងដើម ទៅជា ទីតាំងហាង តាមការណែនាំ */}
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Footer call to actions - បានលុបឃ្លាដឹកជញ្ជូន និងធានាសងប្រាក់ចេញតាមការណែនាំយ៉ាងស្អាត */}
                    <div className="pt-6 border-t border-stone-100 select-none flex flex-col sm:flex-row gap-3">
                      <button 
                        onClick={() => handleAddToCart(selectedProduct)}
                        className="flex-1 border-2 border-amber-500 text-amber-700 font-bold py-3.5 rounded-xl transition-all duration-500 hover:bg-amber-50 active:scale-95 text-sm uppercase tracking-wider flex items-center justify-center gap-2"
                      >
                        <Icons.ShoppingCart /> {t("បញ្ជូលកន្ត្រក", "Add to Cart")}
                      </button>
                      <button 
                        onClick={() => handleDirectBuy(selectedProduct)}
                        className="flex-[2] bg-khmerMaroon hover:bg-khmerMaroonLight text-white font-bold py-3.5 rounded-xl transition-all duration-500 shadow-md hover:shadow-xl hover:scale-[1.01] active:scale-99 text-sm uppercase tracking-wider flex items-center justify-center gap-2"
                      >
                        🛍️ {t("បញ្ជាទិញភ្លាមៗ", "Buy Now")}
                      </button>
                    </div>

                  </div>
                </div>

                {/* Bottom Reviews / Feedback Interface Area */}
                <div className="bg-stone-50 border-t border-stone-200/80 p-4 sm:p-6 lg:p-10">
                  <h3 className="moul-font text-base sm:text-lg text-khmerMaroon mb-6">{t("មតិយោបល់ និងការវាយតម្លៃរបស់អ្នកប្រើប្រាស់", "Customer Feedback & Reviews")}</h3>
                  
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    
                    {/* Write new feedback rating form */}
                    <div className="bg-white p-4 sm:p-5 rounded-2xl border border-stone-200/60 shadow-sm space-y-4">
                      <h4 className="font-bold text-stone-850 text-sm">{t("ចែករំលែកមតិយោបល់របស់អ្នក", "Write an Authentic Review")}</h4>
                      
                      {/* Optional AI helper box */}
                      <div className="bg-amber-500/10 p-3.5 rounded-xl border border-amber-500/20 space-y-2 transition-all duration-500 hover:bg-amber-500/15">
                        <label className="text-[10px] font-bold text-amber-800 block select-none">{t("✨ ជំនួយនិពន្ធមតិយោបល់ដោយ AI", "✨ AI Smart Review Drafting Assistant")}</label>
                        <input 
                          type="text" 
                          placeholder={t("ឧទាហរណ៍៖ ក្រអូប, គុណភាពខ្ពស់, ដឹកលឿន...", "e.g., aromatic, high quality, authentic...")}
                          value={reviewKeywords}
                          onChange={(e) => setReviewKeywords(e.target.value)}
                          className="w-full text-base sm:text-xs bg-stone-50 border border-stone-200 rounded-lg p-3 sm:p-2.5 focus:outline-none focus:ring-1 focus:ring-amber-500"
                        />
                        <button 
                          type="button" 
                          onClick={handleDraftReviewReview}
                          disabled={reviewDraftLoading}
                          className="w-full bg-amber-500 hover:bg-amber-600 text-khmerMaroon font-bold py-2.5 sm:py-2 rounded-xl text-xs sm:text-[10px] transition-all duration-300 active:scale-95 flex items-center justify-center gap-1 shadow-sm select-none"
                        >
                          {reviewDraftLoading ? <Icons.Loader2 /> : <Icons.Bot />}
                          {t("បង្កើតសេចក្តីព្រាង", "Draft with AI")}
                        </button>
                      </div>

                      <form onSubmit={handleAddReview} className="space-y-3.5">
                        <div>
                          <label className="text-xs text-stone-500 block mb-1">{t("ឈ្មោះរបស់អ្នក", "Your Name")}</label>
                          <input 
                            type="text" 
                            placeholder={currentUser ? currentUser.fullName : t("បំពេញឈ្មោះរបស់អ្នក", "Your Name")}
                            value={newReviewAuthor}
                            onChange={(e) => setNewReviewAuthor(e.target.value)}
                            className="w-full text-base sm:text-xs border border-stone-200 rounded-lg p-3 sm:p-2.5 focus:outline-none focus:border-amber-500"
                          />
                        </div>

                        {/* Beautiful Javascript interactive star rating input */}
                        <div>
                          <label className="text-xs text-stone-500 block mb-1 select-none">{t("កម្រិតវាយតម្លៃ (ផ្កាយ)", "Rating Level (Stars)")}</label>
                          <div className="flex items-center space-x-2 py-2 select-none">
                            {[1, 2, 3, 4, 5].map(starNum => (
                              <Icons.Star 
                                key={starNum} 
                                filled={hoverReviewRating ? (starNum <= hoverReviewRating) : (starNum <= newReviewRating)} 
                                onMouseEnter={function() { setHoverReviewRating(starNum); }}
                                onMouseLeave={function() { setHoverReviewRating(0); }}
                                onClick={function() { setNewReviewRating(starNum); }}
                              />
                            ))}
                            <span className="text-xs font-bold text-amber-600 ml-2">
                              {hoverReviewRating ? hoverReviewRating : newReviewRating} / 5
                            </span>
                          </div>
                        </div>

                        <div>
                          <label className="text-xs text-stone-500 block mb-1">{t("មតិយោបល់លម្អិត", "Review Comments")}</label>
                          <textarea 
                            rows="3" 
                            placeholder={t("សរសេរមតិរបស់អ្នកនៅទីនេះ...", "Type review comments here...")}
                            value={newReviewComment}
                            onChange={(e) => setNewReviewComment(e.target.value)}
                            className="w-full text-base sm:text-xs border border-stone-200 rounded-lg p-3 sm:p-2.5 focus:outline-none focus:border-amber-500"
                          ></textarea>
                        </div>

                        <button 
                          type="submit" 
                          className="w-full bg-stone-950 hover:bg-stone-850 text-white font-bold py-3 sm:py-2.5 rounded-xl transition-all duration-300 hover:shadow-md active:scale-95 select-none"
                        >
                          {t("បញ្ជូនមតិយោបល់", "Publish Review")}
                        </button>
                      </form>
                    </div>

                    {/* Active Reviews listing list stream */}
                    <div className="lg:col-span-2 space-y-4 max-h-[480px] overflow-y-auto no-scrollbar">
                      {(productReviews[selectedProduct.id] || []).length > 0 ? (
                        (productReviews[selectedProduct.id] || []).map((rev, index) => (
                          <div key={index} className="bg-white p-4 rounded-xl border border-stone-200/60 shadow-sm space-y-2 hover-scale">
                            <div className="flex items-center justify-between">
                              <span className="text-xs font-bold text-stone-800">{rev.author}</span>
                              <span className="text-[10px] text-stone-400">{rev.date}</span>
                            </div>
                            <div className="flex">
                              {[1, 2, 3, 4, 5].map(star => (
                                <Icons.Star key={star} filled={star <= rev.rating} />
                              ))}
                            </div>
                            <p className="text-xs sm:text-sm text-stone-600 italic">"{rev.comment}"</p>
                          </div>

                  </div>

                  <div>
                    <label className="text-[11px] text-stone-500 block mb-1">{t("តំណភ្ជាប់រូបភាពផលិតផល (URL)", "Product Image Link (URL)")}</label>
                    <input 
                      type="url" 
                      placeholder="https://images.unsplash.com/..."
                      value={newProductForm.productImage}
                      onChange={(e) => updateNewProductForm('productImage', e.target.value)}
                      className="w-full text-base sm:text-xs bg-stone-50 border border-stone-200 rounded-lg p-3 sm:p-2.5 focus:outline-none"
                    />
                  </div>

                  <div>
                    <label className="text-[11px] text-stone-500 block mb-1">{t("ការរៀបរាប់ និងការផលិតលម្អិត (ជាភាសាខ្មែរ)", "Product Description & Handcrafting Technique")}</label>
                    <textarea 
                      rows="3" 
                      placeholder={t("រៀបរាប់ពីផលិតផលសហគមន៍របស់អ្នក...", "Detail raw ingredients, history and technique used to handcraft this...")}
                      value={newProductForm.descriptionKh}
                      onChange={(e) => updateNewProductForm('descriptionKh', e.target.value)}
                      className="w-full text-base sm:text-xs bg-stone-50 border border-stone-200 rounded-lg p-3 sm:p-2.5 focus:outline-none"
                    ></textarea>
                  </div>

                  <div className="pt-4 border-t border-stone-100 flex items-center justify-end space-x-3 select-none">
                    <button 
                      type="button" 
                      onClick={() => setShowSubmitModal(false)}
                      className="px-5 py-3 sm:px-4 sm:py-2 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-xl text-xs font-semibold transition-all duration-200 active:scale-95"
                    >
                      {t("បោះបង់", "Cancel")}
                    </button>
                    <button 
                      type="submit" 
                      className="px-5 py-3 sm:px-5 sm:py-2 bg-amber-500 hover:bg-amber-600 text-khmerMaroon font-bold rounded-xl text-xs transition-all duration-300 active:scale-95 animate-pulse"
                    >
                      {t("ដាក់ស្នើការចុះឈ្មោះ", "Submit Registration (Telegram Notify)")}
                    </button>
                  </div>

                </form>

              </div>
            </div>
          )}

          {/* Quick Order Secure Checkout Modal */}
          {showCheckoutModal && checkoutProduct && (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center p-3 sm:p-4 bg-stone-900/80 overflow-y-auto backdrop-blur-sm">
              <div className="bg-white rounded-2xl sm:rounded-3xl max-w-md w-full overflow-hidden shadow-2xl border border-stone-200 animate-scale-up">
                
                <div className="bg-khmerMaroon text-white p-4.5 sm:p-5 flex items-center justify-between border-b border-amber-600/30 select-none">
                  <h3 className="font-bold text-amber-400 text-sm">🛒 {t("បញ្ជាក់ការទិញផលិតផល", "Secure Instant Checkout")}</h3>
                  <button onClick={() => { setShowCheckoutModal(false); setCheckoutProduct(null); }} className="text-stone-300 hover:text-white transition-transform active:scale-95 p-2 -mr-2">
                    <Icons.X />
                  </button>
                </div>

                <form onSubmit={handleFinalCheckout} className="p-4 sm:p-6 space-y-4">
                  
                  <div className="bg-stone-50 p-4 rounded-xl border border-stone-200 flex items-center gap-3">
                    <div className="w-12 h-12 rounded-lg overflow-hidden bg-stone-200">
                      <img src={checkoutProduct.image} alt={checkoutProduct.name[lang]} className="w-full h-full object-cover" />
                    </div>
                    <div>
                      <h4 className="font-bold text-xs text-stone-855">{checkoutProduct.name[lang]}</h4>
                      <p className="text-xs text-amber-600 font-extrabold">${checkoutProduct.price}</p>
                    </div>
                  </div>

                  <div>
                    <label className="text-xs text-stone-500 block mb-1">{t("ឈ្មោះពេញអ្នកទទួល *", "Receiver Full Name *")}</label>
                    <input 
                      type="text" 
                      required
                      placeholder={currentUser ? currentUser.fullName : t("បំពេញឈ្មោះពេញរបស់អ្នក", "Name")}
                      value={customerInfo.name}
                      onChange={(e) => setCustomerInfo({ ...customerInfo, name: e.target.value })}
                      className="w-full text-base sm:text-xs bg-stone-50 border border-stone-200 rounded-lg p-3 sm:p-2.5 focus:outline-none"
                    />
                  </div>

                  <div>
                    <label className="text-xs text-stone-500 block mb-1">{t("លេខទូរស័ព្ទសម្រាប់ទាក់ទង *", "Contact Phone *")}</label>
                    <input 
                      type="tel" 
                      required
                      placeholder={currentUser ? currentUser.phone : "e.g., 085555666"}
                      value={customerInfo.phone}
                      onChange={(e) => setCustomerInfo({ ...customerInfo, phone: e.target.value })}
                      className="w-full text-base sm:text-xs bg-stone-50 border border-stone-200 rounded-lg p-3 sm:p-2.5 focus:outline-none"
                    />
                  </div>

                  <div>
                    <label className="text-xs text-stone-500 block mb-1">{t("អាសយដ្ឋានដឹកជញ្ជូនលម្អិត *", "Delivery Address *")}</label>
                    <input 
                      type="text" 
                      required
                      placeholder={currentUser ? currentUser.address : t("ផ្ទះលេខ, ផ្លូវលេខ, ខេត្ត...", "House/Street/Province")}
                      value={customerInfo.address}
                      onChange={(e) => setCustomerInfo({ ...customerInfo, address: e.target.value })}
                      className="w-full text-base sm:text-xs bg-stone-50 border border-stone-200 rounded-lg p-3 sm:p-2.5 focus:outline-none"
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-stone-500 block mb-1">{t("តំបន់ដឹកជញ្ជូន", "Delivery Region")}</label>
                      <select 
                        value={customerInfo.delivery}
                        onChange={(e) => setCustomerInfo({ ...customerInfo, delivery: e.target.value })}
                        className="w-full text-base sm:text-xs bg-stone-50 border border-stone-200 rounded-lg p-2.5 focus:outline-none"
                      >
                        <option value="phnompenh">{t("ភ្នំពេញ ($1.5)", "Phnom Penh ($1.5)")}</option>
                        <option value="provinces">{t("បណ្តាខេត្ត ($2.5)", "Provinces ($2.5)")}</option>
                      </select>
                    </div>

                    <div>
                      <label className="text-xs text-stone-500 block mb-1">{t("វិធីទូទាត់ប្រាក់", "Payment Option")}</label>
                      <select 
                        value={customerInfo.paymentMethod}
                        onChange={(e) => setCustomerInfo({ ...customerInfo, paymentMethod: e.target.value })}
                        className="w-full text-base sm:text-xs bg-stone-50 border border-stone-200 rounded-lg p-2.5 focus:outline-none"
                      >
                        <option value="aba">ABA Pay</option>
                        <option value="wing">Wing</option>
                        <option value="cod">{t("ទូទាត់ពេលទំនិញដល់ដៃ (COD)", "Cash on Delivery")}</option>
                      </select>
                    </div>
                  </div>

                  <button 
                    type="submit" 
                    className="w-full bg-amber-500 hover:bg-amber-600 text-khmerMaroon font-bold py-3.5 sm:py-3 rounded-xl transition-all duration-300 active:scale-95 text-xs sm:text-sm flex items-center justify-center gap-1.5 shadow-md hover:shadow-lg select-none"
                  >
                    <Icons.Send />
                    {t("ផ្ញើការបញ្ជាទិញទៅតេឡេក្រាម", "Submit Order to Telegram")}
                  </button>

                </form>

              </div>
            </div>
          )}

          {/* Secure Login Modal */}
          {showLoginModal && (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center p-3 sm:p-4 bg-stone-900/80 overflow-y-auto backdrop-blur-sm">
              <div className="bg-white rounded-2xl sm:rounded-3xl max-w-sm w-full overflow-hidden shadow-2xl border border-stone-200 animate-scale-up">
                
                <div className="bg-khmerMaroon text-white p-4.5 sm:p-5 flex items-center justify-between border-b border-amber-600/30 select-none">
                  <h3 className="font-bold text-amber-400 text-sm">
                    {loginForm.isRegister ? t("ចុះឈ្មោះគណនីអតិថិជន", "Create Account") : t("ចូលប្រើប្រាស់គណនី", "Buyer Portal Login")}
                  </h3>
                  <button onClick={() => setShowLoginModal(false)} className="text-stone-300 hover:text-white transition-transform active:scale-95 p-2 -mr-2">
                    <Icons.X />
                  </button>
                </div>

                <form onSubmit={handleUserAccess} className="p-4 sm:p-6 space-y-4">
                  
                  <div>
                    <label className="text-xs text-stone-500 block mb-1">{t("ឈ្មោះគណនី (Username) *", "Username *")}</label>
                    <input 
                      type="text" 
                      required
                      placeholder="e.g., buyer123"
                      value={loginForm.username}
                      onChange={(e) => updateLoginForm('username', e.target.value)}
                      className="w-full text-base sm:text-xs bg-stone-50 border border-stone-200 rounded-lg p-3 sm:p-2.5 focus:outline-none"
                    />
                  </div>

                  <div>
                    <label className="text-xs text-stone-500 block mb-1">{t("លេខសម្ងាត់ (Password) *", "Password *")}</label>
                    <input 
                      type="password" 
                      required
                      placeholder="••••••••"
                      value={loginForm.password}
                      onChange={(e) => updateLoginForm('password', e.target.value)}
                      className="w-full text-base sm:text-xs bg-stone-50 border border-stone-200 rounded-lg p-3 sm:p-2.5 focus:outline-none"
                    />
                  </div>

                  {loginForm.isRegister && (
                    <div className="space-y-4 animate-slide-down">
                      <div>
                        <label className="text-xs text-stone-500 block mb-1">{t("ឈ្មោះពេញរបស់អ្នក *", "Full Name *")}</label>
                        <input 
                          type="text" 
                          required
                          placeholder="e.g., Sok San"
                          value={loginForm.fullName}
                          onChange={(e) => updateLoginForm('fullName', e.target.value)}
                          className="w-full text-base sm:text-xs bg-stone-50 border border-stone-200 rounded-lg p-3 sm:p-2.5 focus:outline-none"
                        />
                      </div>

                      <div>
                        <label className="text-xs text-stone-500 block mb-1">{t("លេខទូរស័ព្ទ *", "Phone *")}</label>
                        <input 
                          type="tel" 
                          required
                          placeholder="e.g., 085443322"
                          value={loginForm.phone}
                          onChange={(e) => updateLoginForm('phone', e.target.value)}
                          className="w-full text-base sm:text-xs bg-stone-50 border border-stone-200 rounded-lg p-3 sm:p-2.5 focus:outline-none"
                        />
                      </div>

                      <div>
                        <label className="text-xs text-stone-500 block mb-1">{t("អាសយដ្ឋានបច្ចុប្បន្ន", "Address")}</label>
                        <input 
                          type="text" 
                          placeholder="e.g., Phnom Penh"
                          value={loginForm.address}
                          onChange={(e) => updateLoginForm('address', e.target.value)}
                          className="w-full text-base sm:text-xs bg-stone-50 border border-stone-200 rounded-lg p-3 sm:p-2.5 focus:outline-none"
                        />
                      </div>
                    </div>
                  )}

                  <button 
                    type="submit" 
                    className="w-full bg-khmerMaroon hover:bg-khmerMaroonLight text-white font-bold py-3 sm:py-2.5 rounded-xl transition-all duration-300 active:scale-95 text-xs sm:text-sm select-none"
                  >
                    {loginForm.isRegister ? t("បង្កើតគណនី", "Register Now") : t("ចូលទៅកាន់ប្រព័ន្ធ", "Log In")}
                  </button>

                  <div className="text-center pt-2 select-none">
                    <button 
                      type="button" 
                      onClick={() => setLoginForm({ ...loginForm, isRegister: !loginForm.isRegister })}
                      className="text-xs text-amber-600 hover:underline transition-all py-1.5 inline-block"
                    >
                      {loginForm.isRegister ? t("មានគណនីរួចហើយ? ចូលគណនី", "Already have account? Login") : t("មិនទាន់មានគណនី? ចុះឈ្មោះគណនីថ្មី", "Don't have account? Register")}
                    </button>
                  </div>

                </form>

              </div>
            </div>
          )}

          {/* Contact Admin / About Us Modal Overlay */}
          {showAdminModal && (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center p-3 sm:p-4 bg-stone-900/80 overflow-y-auto backdrop-blur-sm">
              <div className="bg-white rounded-2xl sm:rounded-3xl max-w-md w-full overflow-hidden shadow-2xl border border-stone-200 animate-scale-up">
                
                <div className="bg-khmerMaroon text-white p-4.5 sm:p-5 flex items-center justify-between border-b border-amber-600/30 select-none">
                  <h3 className="font-bold text-amber-400 text-sm">ℹ️ {t("អំពីយើង និងព័ត៌មានទំនាក់ទំនង", "About Us & Contact Us")}</h3>
                  <button onClick={() => setShowAdminModal(false)} className="text-stone-300 hover:text-white transition-transform active:scale-95 p-2 -mr-2">
                    <Icons.X />
                  </button>
                </div>

                <div className="p-4 sm:p-6 space-y-5">
                  <div className="text-center space-y-2">
                    <div className="w-16 h-16 bg-amber-500 text-khmerMaroon rounded-full flex items-center justify-center font-bold text-xl mx-auto shadow-md">
                      🌾
                    </div>
                    <h4 className="moul-font text-sm text-khmerMaroon">{t("សហគមន៍ផ្សារអនឡាញផលិតផលខ្មែរ", "Khmer Artisan E-Market")}</h4>
                    <p className="text-xs text-stone-600 leading-relaxed text-justify">
                      {t(
                        "ពួកយើងគឺជាវេទិកាសហគមន៍ដែលមិនស្វែងរកប្រាក់កម្រៃ បង្កើតឡើងដើម្បីជួយផ្សព្វផ្សាយសិប្បកម្ម សម្លៀកបំពាក់ត្បាញដៃ និងកសិផលធម្មជាតិប្រពៃណីរបស់កសិករ និងអ្នកជំនាញខ្មែរនៅតាមជនបទ ឱ្យទទួលបានទីផ្សារទូលំទូលាយ និងរួមចំណែកអភិរក្សកេរដំណែលវប្បធម៌ខ្មែរ។",
                        "We are a non-profit community platform established to showcase traditional handwoven crafts, artisan goods, and organic agricultural products from rural Cambodian creators, linking heritage preservation with viable sustainable livelihoods."
                      )}
                    </p>
                  </div>

                  <hr className="border-stone-200" />

                  <div className="space-y-3">
                    <h5 className="font-bold text-stone-800 text-xs uppercase tracking-wider text-amber-700">{t("ព័ត៌មានទំនាក់ទំនងស្ថាបនិក៖", "Founder Contact Details:")}</h5>
                    <div className="bg-stone-50 p-4 rounded-xl border border-stone-200 text-xs text-stone-600 space-y-2.5">
                      <p><strong>{t("ឈ្មោះ៖", "Name:")}</strong> {ADMIN_INFO.name[lang]}</p>
                      <p><strong>{t("តួនាទី៖", "Title:")}</strong> {ADMIN_INFO.title[lang]}</p>
                      <p className="flex items-center gap-2">
                        <Icons.Phone />
                        <strong>{t("លេខទូរស័ព្ទ៖", "Phone:")}</strong> {ADMIN_INFO.phone}
                      </p>
                      <p className="flex items-center gap-2">
                        <Icons.Mail />
                        <strong>{t("សារអេឡិចត្រូនិច៖", "Email:")}</strong> {ADMIN_INFO.email}
                      </p>
                    </div>
                  </div>

                  <div className="flex gap-3 pt-2 select-none">
                    <button 
                      onClick={() => setShowAdminModal(false)}
                      className="flex-1 bg-stone-100 hover:bg-stone-200 text-stone-600 font-bold py-3 rounded-xl text-xs sm:text-sm transition-all duration-200 active:scale-95"
                    >
                      {t("បិទ", "Close")}
                    </button>
                    <a 
                      href={ADMIN_INFO.telegramLink} 
                      target="_blank" 
                      className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-xs sm:text-sm block text-center transition-all duration-300 hover:scale-105 active:scale-95"
                    >
                      Telegram Connect
                    </a>
                  </div>
                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

  </script>
</body>
</html>
